spring.application.name=app-back
spring.datasource.url=jdbc:postgresql://localhost:5432/mydb
spring.datasource.username=postgres
spring.datasource.password=admis

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
jwt.secret=mySecretKeyForJWTAuthenticationThatIsLongEnoughForHS256AlgorithmForSecurityPurpose
jwt.expiration=86400000

# Logging Diagnostics
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG

# Server Config
server.port=8081

# Allow large base64 image payloads in JSON requests
server.tomcat.max-http-post-size=52428800
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB